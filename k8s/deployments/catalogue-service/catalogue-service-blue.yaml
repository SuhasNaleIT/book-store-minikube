apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-service-blue
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogue-service
      version: blue
  template:
    metadata:
      labels:
        app: catalogue-service
        version: blue
    spec:
      containers:
      - name: catalogue-service
        image: 985317222363.dkr.ecr.eu-west-2.amazonaws.com/bookstore/catalogue-service:v3
        ports:
        - containerPort: 8000          # ← correct port from run.py
        env:
        - name: APP_VERSION
          value: "v3"                  # ← Update the Version before deployment
        - name: DATABASE_URL           # ← matches config.py exactly
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: catalogue-database-url
        - name: FLASK_ENV              # ← uses ProductionConfig
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: FLASK_ENV
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-service
  namespace: bookstore
spec:
  selector:
    app: catalogue-service
    version: blue
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
