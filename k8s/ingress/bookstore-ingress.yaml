apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookstore-ingress
  namespace: bookstore
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx              
  rules:
  - http:
      paths:
      - path: /api/books               
        pathType: Prefix
        backend:
          service:
            name: catalogue-service
            port:
              number: 80
      - path: /            
        pathType: Prefix
        backend:
          service:
            name: app-service
            port:
              number: 80